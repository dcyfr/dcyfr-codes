name: Extract Skills Snippets

on:
  schedule:
    # Weekly on Tuesday at 06:00 UTC
    - cron: '0 6 * * 2'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not commit changes)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    name: Extract skills → snippets.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dcyfr-codes-snippets
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout dcyfr-workspace (skills + examples)
        uses: actions/checkout@v4
        with:
          repository: dcyfr/dcyfr-workspace
          token: ${{ secrets.DCYFR_WORKSPACE_PAT }}
          path: dcyfr-workspace
          sparse-checkout: |
            .claude/skills
            dcyfr-ai/examples
            dcyfr-ai-nodejs/examples

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Extract snippets
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: |
          node scripts/extract-skills-snippets.mjs \
            --workspace-root ./dcyfr-workspace \
            $DRY_RUN

      - name: Lint extracted snippets
        run: node scripts/lint-snippets.mjs

      - name: Check for changes
        id: changes
        run: |
          git add -f data/snippets.json
          git diff --cached --exit-code data/snippets.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'content: sync snippets from workspace skills'
          branch: snippets-sync
          title: 'content: Skills snippet sync'
          body: |
            Automated snippet sync from dcyfr-workspace `.claude/skills/` + `dcyfr-ai/examples/`.

            Review `data/snippets.json` before merging.
          labels: content,automated
          delete-branch: true
